name: Release
run-name: "Release ${{ github.event.client_payload.version || github.ref_name }} to VS Marketplace (${{ github.event_name == 'repository_dispatch' && 'core' || 'adapter' }})"

on:
  repository_dispatch:
    types: [core-release]
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # ── Resolve version ──────────────────────────────────────────────────────
      - name: Resolve version
        run: |
          ADAPTER_TAG="${{ github.event.client_payload.version || github.ref_name }}"
          CORE_TAG=$(echo "$ADAPTER_TAG" | sed 's/\.[0-9]*$/.0/')
          VERSION="${ADAPTER_TAG#v}"
          echo "ADAPTER_TAG=$ADAPTER_TAG"   >> "$GITHUB_ENV"
          echo "CORE_TAG=$CORE_TAG"         >> "$GITHUB_ENV"
          echo "VERSION=$VERSION"           >> "$GITHUB_ENV"

      # ── Download wasm-pack artifacts from core release ───────────────────────
      # VS Code extension expects wasm/lpdf.js and wasm/lpdf_bg.wasm
      - name: Download wasm-pack artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p wasm
          for attempt in 1 2 3; do
            gh release download "$CORE_TAG" \
              --repo lpdfio/lpdf \
              --pattern "lpdf.js" \
              --pattern "lpdf_bg.wasm" \
              --dir wasm && break
            echo "Attempt $attempt failed — retrying in 10s..."
            sleep 10
          done
          # Fallback to latest release when the derived tag doesn't exist yet
          if [ ! -f wasm/lpdf.js ]; then
            gh release download \
              --repo lpdfio/lpdf \
              --pattern "lpdf.js" \
              --pattern "lpdf_bg.wasm" \
              --dir wasm \
              --clobber
          fi

      # ── Build ────────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set version in package.json
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install and build
        run: npm ci && npm run build

      # ── Package and publish ───────────────────────────────────────────────────
      # No automated tests — add a test step here when a test suite is available.
      - name: Package extension
        run: npx vsce package --out lpdf.vsix

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --pat "${{ secrets.VSCE_PAT }}" --packagePath lpdf.vsix

      # ── Create GitHub Release (core-triggered only) ──────────────────────────
      - name: Create GitHub Release
        if: github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "$ADAPTER_TAG"
          git push origin "$ADAPTER_TAG"
          gh release create "$ADAPTER_TAG" \
            --title "$ADAPTER_TAG" \
            --generate-notes
